<svg width="800" height="250" viewBox="0 0 800 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="250" rx="20" fill="#030303"/>
  
  <!-- Subtle top radial glow to simulate glass reflection -->
  <ellipse cx="400" cy="-50" rx="400" ry="200" fill="url(#topGlow)" opacity="0.3"/>
  
  <!-- Grid pattern overlay -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
  </pattern>
  <rect width="800" height="250" rx="20" fill="url(#grid)"/>

  <!-- Gradient Border -->
  <rect x="0.5" y="0.5" width="799" height="249" rx="19.5" stroke="url(#borderGlow)" stroke-width="1"/>

  <!-- Texts -->
  <text x="400" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">OPEN BUTTON</text>
  <text x="400" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="500" fill="#777777" text-anchor="middle" letter-spacing="4">THE STANDARD FOR MODERN INTERFACES</text>

  <defs>
    <radialGradient id="topGlow" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGlow" x1="0" y1="0" x2="800" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#444444"/>
      <stop offset="0.4" stop-color="#111111"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>
</svg>

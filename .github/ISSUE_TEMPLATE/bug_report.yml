name: Bug Report
description: Report a reproducible bug in Tokokino
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide a clear, reproducible report.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug
      placeholder: Canvas export fails for external images
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to trigger the issue
      placeholder: |
        1. Open editor
        2. Add external background image
        3. Click export
        4. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Export should complete and download image
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: Export fails with blank output
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app version/commit
      placeholder: Chrome 136, macOS 15, main@abc123
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Logs / Errors
      description: Paste relevant logs (remove secrets)
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, recordings, related links

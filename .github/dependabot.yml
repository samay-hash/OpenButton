version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      cloudflare:
        patterns:
          - "@opennextjs/*"
          - "@cloudflare/*"
          - wrangler
      test-tooling:
        patterns:
          - vitest
          - jsdom
          - "@vitest/*"
      type-tooling:
        patterns:
          - typescript
          - typescript-eslint
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 3
